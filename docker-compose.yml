services:
  gastracker:
    build: .
    restart: unless-stopped
    ports:
      - "5220:8080"
    volumes:
      - gastracker-data:/app/data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Data Source=/app/data/gastracker.db
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}

volumes:
  gastracker-data:
